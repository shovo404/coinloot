<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Loot</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Prevent third-party polyfills (like formdata-polyfill) from crashing when trying to assign to read-only global fetch in sandboxed iframe -->
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get() { return currentFetch; },
            set(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Defensive fetch patch failed or window.fetch is already writable:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
